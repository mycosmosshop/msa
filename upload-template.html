<div style="font-family:'Segoe UI',sans-serif;padding:40px;color:#667eea">Yükleniyor…</div>
<script>
(async () => {
  try {
    // GET /msa/upload-template portu — msaRoutes.js:5149 (locals: user, branding)
    const user = await MSA.currentUser();
    const branding = MSA.BRANDING;
    await MSA.renderPage('upload-template.ejs', { user, branding });
  } catch (e) {
    console.error(e);
    MSA.renderError('Hata', 'Sayfa yüklenirken hata oluştu: ' + e.message);
  }
})();
</script>
