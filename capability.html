<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>window.ERP_GUARD_ALLOW=function(){return ['localhost','127.0.0.1'].includes(location.hostname);};</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://mycosmosshop.github.io/erp-portal/erp-guard.js"></script>
<script src="js/msa-common.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<title>Proses Yeterliliği (Cp/Cpk)</title>
<style>
  :root{--p:#667eea;--p2:#764ba2;--bg:#f5f7fb;--card:#fff;--ink:#232a35;--muted:#6b7280;--line:#e6e9f2}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .wrap{max-width:1100px;margin:0 auto;padding:20px}
  .hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:16px;padding:20px 26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .hdr h1{margin:0;font-size:21px;display:flex;align-items:center;gap:10px}
  .hdr p{margin:4px 0 0;opacity:.9;font-size:13px}
  .btn{border:0;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:#fff;color:var(--p)} .btn.ghost{background:rgba(255,255,255,.2);color:#fff}
  .acts{display:flex;gap:10px;flex-wrap:wrap}
  .dd{position:relative}
  .ddmenu{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(30,40,70,.2);min-width:290px;padding:6px;display:none;z-index:20}
  .dd.open .ddmenu{display:block}
  .ddmenu a{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:9px;text-decoration:none;color:var(--ink);font-size:13.5px}
  .ddmenu a:hover{background:#f2f4fb} .ddmenu a i{color:var(--p);font-size:16px;margin-top:1px} .ddmenu a small{display:block;color:var(--muted);font-weight:400;font-size:11.5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:20px}
  .cardk{background:var(--card);border-radius:14px;box-shadow:0 2px 12px rgba(30,40,70,.07);padding:16px 18px;border:1px solid var(--line)}
  .cardk h3{margin:0 0 12px;font-size:16px}
  .row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin:6px 0;color:var(--muted)}
  .row strong{color:var(--ink)}
  .badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .b-ok{background:#e6f7ec;color:#1e7e4a} .b-bad{background:#fdecea;color:#c0392b} .b-mid{background:#fff4e0;color:#b7791f} .b-draft{background:#eef1f8;color:#5a6b8c}
  .cardacts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .sbtn{flex:1;text-align:center;border:0;border-radius:8px;padding:8px 6px;font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:5px}
  .sbtn.view{background:var(--p);color:#fff} .sbtn.edit{background:#f0a020;color:#fff} .sbtn.del{background:#f4e6e6;color:#c0392b}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:50px 20px;text-align:center;color:var(--muted);margin-top:24px}
  .empty i{font-size:44px;color:#c9d2e3;display:block;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <h1><i class="bi bi-graph-up"></i> Proses Yeterliliği</h1>
      <p>Cp / Cpk / Pp / Ppk yeterlilik analizi — JASP uyumlu</p>
    </div>
    <div class="acts">
      <div class="dd" id="ddNew">
        <button class="btn primary" onclick="document.getElementById('ddNew').classList.toggle('open');event.stopPropagation();"><i class="bi bi-plus-circle"></i> Yeni Çalışma <i class="bi bi-chevron-down"></i></button>
        <div class="ddmenu">
          <a href="cap-new.html"><i class="bi bi-rulers"></i> <span>Proses Yeterliliği (Cp/Cpk)<small>Ölçüm verisi — sürekli değer</small></span></a>
          <a href="cap-attributes.html?mode=binomial"><i class="bi bi-check2-square"></i> <span>Binomial (Kusurlu)<small>Geçti/Kaldı — kusurlu oranı, PPM, Süreç Z</small></span></a>
          <a href="cap-attributes.html?mode=poisson"><i class="bi bi-123"></i> <span>Poisson (Hata Sayısı)<small>Birim başına hata — DPU, DPMO</small></span></a>
        </div>
      </div>
    </div>
  </div>
  <div id="body"><div style="padding:40px;color:var(--p)">Yükleniyor…</div></div>
</div>
<script>
document.addEventListener('click', function(){ var d=document.getElementById('ddNew'); if(d) d.classList.remove('open'); });
(async () => {
  const body = document.getElementById('body');
  try {
    await MSA.currentUser();
    const { data: studies, error } = await MSA.db.from(MSA.T.studies)
      .select('*')
      .eq('study_type','capability')
      .is('copied_from_id', null)
      .order('created_at', { ascending:false });
    if (error) throw error;

    if (!studies || studies.length === 0) {
      body.innerHTML = '<div class="empty"><i class="bi bi-graph-up"></i><div style="font-size:16px;font-weight:600;color:#4a5568">Henüz proses yeterliliği çalışması yok</div><div style="margin-top:6px">Başlamak için sağ üstteki <b>Yeni Çalışma</b> düğmesine tıklayın.</div></div>';
      return;
    }

    const dt = s => s.created_at ? new Date(s.created_at).toLocaleDateString('tr-TR') : '-';
    const badge = s => {
      if (s.status !== 'calculated') return '<span class="badge b-draft">Taslak</span>';
      const a = (s.is_acceptable === true || s.is_acceptable === 'acceptable') ? 'ok'
              : (s.is_acceptable === false || s.is_acceptable === 'unacceptable') ? 'bad' : 'mid';
      return a==='ok' ? '<span class="badge b-ok">✓ Yeterli</span>'
           : a==='bad' ? '<span class="badge b-bad">✗ Yetersiz</span>'
           : '<span class="badge b-mid">⚠ Marjinal</span>';
    };

    body.innerHTML = '<div class="grid">' + studies.map(s => {
      const target = s.status === 'calculated' ? 'cap-results.html' : 'cap-data-entry.html';
      return `<div class="cardk">
        <h3>${MSA.esc ? MSA.esc(s.study_name) : (s.study_name||'')}</h3>
        <div class="row"><span>Durum</span>${badge(s)}</div>
        ${s.characteristic ? `<div class="row"><span>Karakteristik</span><strong>${s.characteristic}</strong></div>` : ''}
        <div class="row"><span>Tarih</span><strong>${dt(s)}</strong></div>
        <div class="cardacts">
          <a class="sbtn view" href="cap-results.html?id=${s.id}"><i class="bi bi-eye"></i> Sonuçlar</a>
          <a class="sbtn edit" href="cap-data-entry.html?id=${s.id}"><i class="bi bi-pencil"></i> Veri</a>
          <button class="sbtn del" data-id="${s.id}" data-name="${(s.study_name||'').replace(/"/g,'&quot;')}"><i class="bi bi-trash"></i> Sil</button>
        </div>
      </div>`;
    }).join('') + '</div>';

    body.querySelectorAll('.sbtn.del').forEach(btn => btn.addEventListener('click', async () => {
      const id = btn.dataset.id, name = btn.dataset.name;
      if (!confirm('"'+name+'" çalışmasını silmek istediğinize emin misiniz? Bu işlem geri alınamaz.')) return;
      btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass"></i>';
      try {
        await MSA.db.from(MSA.T.measurements).delete().eq('study_id', id);
        await MSA.db.from(MSA.T.parts).delete().eq('study_id', id);
        await MSA.db.from(MSA.T.operators).delete().eq('study_id', id);
        const { error: dErr } = await MSA.db.from(MSA.T.studies).delete().eq('id', id);
        if (dErr) throw dErr;
        btn.closest('.cardk').remove();
        if (!body.querySelector('.cardk')) location.reload();
      } catch(e){ alert('Silme hatası: '+e.message); btn.disabled=false; btn.innerHTML='<i class="bi bi-trash"></i> Sil'; }
    }));
  } catch (e) {
    body.innerHTML = '<div class="empty" style="color:#c0392b"><i class="bi bi-exclamation-triangle"></i>Yüklenemedi: '+e.message+'</div>';
  }
})();
</script>
</body>
</html>
