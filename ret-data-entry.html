<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>window.ERP_GUARD_ALLOW=function(){return ['localhost','127.0.0.1'].includes(location.hostname);};</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://mycosmosshop.github.io/erp-portal/erp-guard.js"></script>
<script src="js/msa-common.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<title>Test-Retest Veri Girişi</title>
<style>
  :root{--p:#667eea;--p2:#764ba2;--bg:#f5f7fb;--card:#fff;--ink:#232a35;--muted:#6b7280;--line:#e6e9f2}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .wrap{max-width:900px;margin:0 auto;padding:18px}
  .hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:14px;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .hdr h1{margin:0;font-size:18px}
  .btn{border:0;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff} .btn.ok{background:#1e7e4a;color:#fff} .btn.ghost{background:#eef1f8;color:#41506b}
  .card{background:var(--card);border-radius:13px;box-shadow:0 2px 10px rgba(30,40,70,.07);padding:14px;margin:14px 0;overflow:auto}
  .hint{font-size:12px;color:var(--muted);margin:8px 2px}
  table{border-collapse:collapse;font-size:13px;min-width:100%}
  th,td{border:1px solid var(--line);padding:4px 6px;text-align:center;white-space:nowrap}
  th{background:#f3f5fb;font-weight:600;font-size:11.5px}
  td.part{background:#fafbff;font-weight:600;text-align:left}
  input.m{width:74px;text-align:center;border:1px solid var(--line);border-radius:6px;padding:5px 2px;font-size:13px}
  .acts{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1><i class="bi bi-grid-3x3-gap"></i> Test-Retest Veri Girişi</h1><div id="sub" style="opacity:.9;font-size:12.5px"></div></div>
    <div class="acts">
      <button class="btn ok" id="save"><i class="bi bi-save"></i> Kaydet</button>
      <a class="btn primary" id="calc" href="#"><i class="bi bi-graph-up"></i> Hesapla ve Sonuçlar</a>
      <a class="btn ghost" href="index.html"><i class="bi bi-arrow-left"></i> Pano</a>
    </div>
  </div>
  <div id="msg"></div>
  <div class="hint">Her parçayı aynı cihazla <b>tekrar tekrar</b> ölçün ve değerleri girin. Klasik yöntemde her parça 2 kez ölçülür (test + retest).</div>
  <div class="card"><table id="grid"></table></div>
  <div class="hint" id="prog"></div>
</div>
<script>
(async () => {
  const studyId = MSA.requireQ('id');
  const err = MSA.q('error'); if(err){ document.getElementById('msg').innerHTML='<div style="background:#fdecea;color:#c0392b;padding:10px 14px;border-radius:9px;margin:10px 0">'+err+'</div>'; }
  const { data: study } = await MSA.db.from(MSA.T.studies).select('*').eq('id',studyId).maybeSingle();
  if(!study){ document.body.innerHTML='<p style="padding:40px">Çalışma bulunamadı</p>'; return; }
  document.getElementById('sub').textContent=study.study_name;
  document.getElementById('calc').href='ret-results.html?id='+studyId;

  const { measurements, parts } = await MSA.getMeasurementsWithNames(studyId);
  const nT=study.num_trials;
  const existing={}; measurements.forEach(m=>existing[m.part+'-'+m.trial]=m.measurement);

  let head='<tr><th class="part">Parça</th>';
  for(let t=1;t<=nT;t++) head+='<th>Ölçüm '+t+'</th>';
  head+='</tr>';
  let rows='';
  parts.forEach(p=>{ const pn=p.part_number;
    rows+='<tr><td class="part">'+(p.part_name||('Parça '+pn))+'</td>';
    for(let t=1;t<=nT;t++){ const v=(existing[pn+'-'+t]==null?'':Number(existing[pn+'-'+t]));
      rows+='<td><input class="m" data-part="'+pn+'" data-trial="'+t+'" value="'+v+'"></td>'; }
    rows+='</tr>';
  });
  document.getElementById('grid').innerHTML=head+rows;

  function prog(){ const ms=[...document.querySelectorAll('input.m')]; const f=ms.filter(i=>i.value.trim()!=='').length;
    document.getElementById('prog').textContent=f+' / '+ms.length+' ölçüm girildi'; }
  document.querySelectorAll('input').forEach(i=>i.addEventListener('input',prog)); prog();

  async function saveAll(){
    const meas=[]; [...document.querySelectorAll('input.m')].forEach(i=>{
      const v=i.value.trim(); if(v==='') return;
      meas.push({ operator:'1', part:String(i.dataset.part), trial:parseInt(i.dataset.trial), measurement:parseFloat(v) });
    });
    const res=await MSA.saveMeasurements(studyId, meas);
    if(!res.success) throw new Error(res.message||'Kayıt hatası'); return res.count;
  }
  document.getElementById('save').addEventListener('click', async ()=>{
    const b=document.getElementById('save'); b.disabled=true; b.textContent='Kaydediliyor…';
    try{ const c=await saveAll(); b.innerHTML='<i class="bi bi-check2"></i> Kaydedildi ('+c+')'; setTimeout(()=>{b.disabled=false;b.innerHTML='<i class="bi bi-save"></i> Kaydet';},1500); }
    catch(e){ alert('Hata: '+e.message); b.disabled=false; b.innerHTML='<i class="bi bi-save"></i> Kaydet'; }
  });
  document.getElementById('calc').addEventListener('click', async (e)=>{
    e.preventDefault(); const a=e.currentTarget; a.style.pointerEvents='none';
    try{ await saveAll(); location.href='ret-results.html?id='+studyId; }
    catch(err){ alert('Hata: '+err.message); a.style.pointerEvents='auto'; }
  });
})();
</script>
</body>
</html>
