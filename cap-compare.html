<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<script>window.ERP_GUARD_ALLOW=function(){return ['localhost','127.0.0.1'].includes(location.hostname);};</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://mycosmosshop.github.io/erp-portal/erp-guard.js"></script>
<script src="js/msa-common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<title>Yeterlilik Karşılaştırma (Önce / Sonra)</title>
<style>
  :root{--p:#667eea;--p2:#764ba2;--bg:#f5f7fb;--card:#fff;--ink:#232a35;--muted:#6b7280;--line:#e6e9f2;--good:#1e7e4a;--gbg:#eaf6ef;--bad:#c0392b}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .wrap{max-width:1000px;margin:0 auto;padding:18px}
  .hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:16px;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .hdr h1{margin:0;font-size:20px} .hdr p{margin:3px 0 0;opacity:.9;font-size:12.5px}
  .btn{border:0;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff} .btn.ghost{background:#eef1f8;color:#41506b} .btn.ok{background:#1e7e4a;color:#fff}
  .card{background:var(--card);border-radius:14px;box-shadow:0 2px 12px rgba(30,40,70,.07);padding:16px 18px;margin:14px 0}
  .card h2{margin:0 0 6px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px} .card h2 .i{color:var(--p)}
  .exp{background:#f8f9fd;border-left:3px solid var(--p);border-radius:0 8px 8px 0;padding:10px 13px;font-size:12.8px;color:#4a5568;margin:8px 0;line-height:1.55}
  textarea{width:100%;min-height:70px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:13px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-top:10px}
  .fld{display:flex;flex-direction:column;font-size:12px;font-weight:600;color:#4a5568;gap:5px}
  .fld input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;width:110px}
  .chartbox{position:relative;height:280px}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:center} td:first-child,th:first-child{text-align:left}
  th{background:#f3f5fb;color:#39415a;font-size:12px}
  .up{color:var(--good);font-weight:700} .down{color:var(--bad);font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1><i class="bi bi-arrow-left-right"></i> Yeterlilik Karşılaştırma</h1>
      <p>İyileştirme öncesi / sonrası Cp·Cpk·Pp·Ppk·PPM yan yana (Minitab Capability Comparison)</p></div>
    <a class="btn ghost" href="capability.html" style="background:rgba(255,255,255,.2);color:#fff"><i class="bi bi-arrow-left"></i> Pano</a>
  </div>

  <div class="card">
    <h2><i class="bi bi-table i"></i> Veri (aynı spesifikasyon, iki dönem)</h2>
    <div class="grid2">
      <div><div style="font-weight:700;margin-bottom:4px;color:#5a6b8c">ÖNCE (Baseline)</div><textarea id="before" placeholder="Önce dönemi ölçümleri…"></textarea></div>
      <div><div style="font-weight:700;margin-bottom:4px;color:var(--good)">SONRA (Current)</div><textarea id="after" placeholder="Sonra dönemi ölçümleri…"></textarea></div>
    </div>
    <div class="row">
      <div class="fld">LSL<input type="number" id="lsl" step="any"></div>
      <div class="fld">Hedef<input type="number" id="target" step="any"></div>
      <div class="fld">USL<input type="number" id="usl" step="any"></div>
      <div class="fld">Alt grup<input type="number" id="sg" value="5" min="1" max="25" style="width:80px"></div>
      <button class="btn primary" onclick="calc()"><i class="bi bi-graph-up"></i> Karşılaştır</button>
      <button class="btn ok" onclick="loadExample()"><i class="bi bi-magic"></i> Örnek Veriyi Yükle</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px;border-top:1px solid var(--line);padding-top:12px">
      <input id="studyName" placeholder="Çalışma adı (panoya kaydetmek için)" style="flex:1;min-width:200px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px">
      <button class="btn primary" onclick="saveStudy()"><i class="bi bi-save"></i> Panoya Kaydet</button>
    </div>
  </div>

  <div id="report"></div>
</div>

<script>
var charts=[];
function loadScript(src){return new Promise(function(res,rej){var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=function(){rej(new Error(src));};document.head.appendChild(s);});}
function loadExample(){
  var b=[],a=[]; for(var i=0;i<100;i++){ var z=Math.sin(i*2.1)+Math.cos(i*1.3)+Math.sin(i*0.7);
    b.push((100+z*2.6).toFixed(2));           // önce: geniş yayılım
    a.push((100+z*1.4).toFixed(2)); }          // sonra: dar yayılım (iyileşme)
  document.getElementById('before').value=b.join(' ');
  document.getElementById('after').value=a.join(' ');
  document.getElementById('lsl').value=94; document.getElementById('usl').value=106; document.getElementById('target').value=100;
}
function nf(x,d){ if(x==null||!isFinite(x))return '—'; var ax=Math.abs(x); if(ax!==0&&(ax>=1e6||ax<1e-4))return Number(x).toExponential(2); return Number(x).toFixed(d==null?3:d); }
function parseVals(id){ return document.getElementById(id).value.trim().split(/[\s,;]+/).map(Number).filter(function(v){return isFinite(v);}); }

function calc(){
  var vb=parseVals('before'), va=parseVals('after');
  if(vb.length<10||va.length<10){ alert('Her iki döneme de en az 10 ölçüm girin.'); return; }
  var opts={ lsl:parseFloat(document.getElementById('lsl').value), usl:parseFloat(document.getElementById('usl').value),
    target:(document.getElementById('target').value!==''?parseFloat(document.getElementById('target').value):null), subgroupSize:parseInt(document.getElementById('sg').value)||5 };
  var rb,ra;
  try{ rb=window.capCalculations.calculateCapability(vb.map(function(v){return {value:v};}),opts);
       ra=window.capCalculations.calculateCapability(va.map(function(v){return {value:v};}),opts); }
  catch(e){ alert('Hata: '+e.message); return; }
  draw(rb,ra,opts);
}

function chg(before,after,higherBetter){ if(before==null||after==null||!isFinite(before)||!isFinite(after))return '—'; var d=after-before; var cls=(higherBetter?d>0:d<0)?'up':(d===0?'':'down'); var pct=before!==0?(d/Math.abs(before)*100):0; return '<span class="'+cls+'">'+(d>0?'+':'')+nf(d,3)+' ('+(pct>0?'+':'')+nf(pct,1)+'%)</span>'; }

function draw(rb,ra,opts){
  charts.forEach(function(c){try{c.destroy();}catch(e){}}); charts=[];
  function row(lbl,b,a,hb,dec){ return '<tr><td>'+lbl+'</td><td>'+nf(b,dec)+'</td><td>'+nf(a,dec)+'</td><td>'+chg(b,a,hb)+'</td></tr>'; }
  var html='<div class="card"><h2><i class="bi bi-clipboard-data i"></i> Karşılaştırma Tablosu</h2>'+
    '<table><thead><tr><th>Metrik</th><th>Önce</th><th>Sonra</th><th>Değişim</th></tr></thead><tbody>'+
    row('Ortalama',rb.studyInfo.mean,ra.studyInfo.mean,null,3)+
    row('σ (within)',rb.studyInfo.sigmaWithin,ra.studyInfo.sigmaWithin,false,4)+
    row('σ (overall)',rb.studyInfo.sigmaOverall,ra.studyInfo.sigmaOverall,false,4)+
    row('Cp',rb.within.cp,ra.within.cp,true)+
    row('Cpk',rb.within.cpk,ra.within.cpk,true)+
    row('Pp',rb.overall.cp,ra.overall.cp,true)+
    row('Ppk',rb.overall.cpk,ra.overall.cpk,true)+
    row('PPM (beklenen, overall)',rb.performance.expectedOverall.total,ra.performance.expectedOverall.total,false,0)+
    '</tbody></table>'+
    '<div class="exp"><b>Yorum:</b> Yeşil = iyileşme, kırmızı = kötüleşme. Cpk/Ppk arttı ve PPM azaldıysa süreç iyileşmiştir. σ küçüldüyse değişkenlik azalmış demektir. '+
      'Cpk: '+nf(rb.within.cpk)+' → '+nf(ra.within.cpk)+' ('+(ra.within.cpk>rb.within.cpk?'<b class="up">iyileşme</b>':'<b class="down">gerileme</b>')+').</div>'+
    '<div style="font-weight:600;font-size:12.5px;text-align:center;margin-top:12px">Üst Üste Yoğunluk (Önce gri · Sonra mavi) + Spesifikasyon</div>'+
    '<div class="chartbox"><canvas id="cmpHist"></canvas></div>'+
    '<div style="font-weight:600;font-size:12.5px;text-align:center;margin-top:16px">Ayrı Histogramlar (yan yana)</div>'+
    '<div class="grid2" style="margin-top:6px">'+
      '<div><div style="text-align:center;font-weight:700;font-size:12px;color:#5a6b8c">ÖNCE (Baseline)</div><div class="chartbox" style="height:230px"><canvas id="cmpBefore"></canvas></div></div>'+
      '<div><div style="text-align:center;font-weight:700;font-size:12px;color:var(--good)">SONRA (Current)</div><div class="chartbox" style="height:230px"><canvas id="cmpAfter"></canvas></div></div>'+
    '</div>'+
    '</div>';
  document.getElementById('report').innerHTML=html;

  // Üst üste histogram (ortak eksende)
  var gb=rb.graph, ga=ra.graph;
  var lo=Math.min(gb.hist[0].x0, ga.hist[0].x0), hi=Math.max(gb.hist[gb.hist.length-1].x1, ga.hist[ga.hist.length-1].x1);
  var bins=14, bw=(hi-lo)/bins;
  function binOf(g){ var arr=[]; for(var i=0;i<bins;i++)arr.push(0); return arr; }
  // ham veriyi yeniden binle (grafiklerdeki hist farklı aralıkta olabilir → curve'lerden yararlanmak yerine eğri çiz)
  var cb=[],ca=[]; for(var i=0;i<=100;i++){ var x=lo+(hi-lo)*i/100;
    cb.push({x:x,y:Math.exp(-0.5*Math.pow((x-gb.mean)/gb.sigmaOverall,2))/(gb.sigmaOverall*Math.sqrt(2*Math.PI))});
    ca.push({x:x,y:Math.exp(-0.5*Math.pow((x-ga.mean)/ga.sigmaOverall,2))/(ga.sigmaOverall*Math.sqrt(2*Math.PI))}); }
  var specP={ id:'sp', afterDatasetsDraw:function(c){ var ctx=c.ctx,x=c.scales.x,y=c.scales.y;
    function vl(v,col,lbl){ if(v==null||!isFinite(v))return; var px=x.getPixelForValue(v); if(px<x.left-1||px>x.right+1)return; ctx.save(); ctx.strokeStyle=col; ctx.setLineDash([6,4]); ctx.lineWidth=1.8; ctx.beginPath(); ctx.moveTo(px,y.top+10); ctx.lineTo(px,y.bottom); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle=col; ctx.font='bold 10px Segoe UI'; ctx.textAlign='center'; ctx.fillText(lbl,px,y.top+8); ctx.restore(); }
    vl(opts.lsl,'#c0392b','LSL'); vl(opts.usl,'#c0392b','USL'); vl(opts.target,'#1e7e4a','Hedef'); }};
  charts.push(new Chart(document.getElementById('cmpHist'),{ data:{ datasets:[
    { type:'line', label:'Önce', data:cb, borderColor:'#8f9bb8', backgroundColor:'rgba(140,150,170,.18)', pointRadius:0, borderWidth:2, tension:0.35, fill:true },
    { type:'line', label:'Sonra', data:ca, borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.12)', pointRadius:0, borderWidth:2.4, tension:0.35, fill:true }
  ]}, options:{ responsive:true, maintainAspectRatio:false, layout:{padding:{top:10}}, scales:{ x:{type:'linear',min:lo,max:hi,title:{display:true,text:'Ölçüm'}}, y:{title:{display:true,text:'Yoğunluk'},beginAtZero:true} }, plugins:{legend:{display:true,position:'top'}} }, plugins:[specP] }));

  // Ayrı histogramlar (Önce | Sonra) — barlar + normal eğri + spesifikasyon
  function singleHist(id, r, barColor){
    var g=r.graph, N=r.studyInfo.N;
    var hlo=Math.min(g.hist[0].x0, opts.lsl!=null?opts.lsl:g.hist[0].x0), hhi=Math.max(g.hist[g.hist.length-1].x1, opts.usl!=null?opts.usl:g.hist[g.hist.length-1].x1);
    var bw=g.hist[0].x1-g.hist[0].x0;
    var curve=[]; for(var i=0;i<=80;i++){ var x=hlo+(hhi-hlo)*i/80; curve.push({x:x, y:Math.exp(-0.5*Math.pow((x-g.mean)/g.sigmaOverall,2))/(g.sigmaOverall*Math.sqrt(2*Math.PI))*N*bw}); }
    var sp={ id:'sp'+id, afterDatasetsDraw:function(c){ var ctx=c.ctx,xl=c.scales.xLin,y=c.scales.y; if(!xl)return;
      function vl(v,col,lbl){ if(v==null||!isFinite(v))return; var px=xl.getPixelForValue(v); if(px<xl.left-1||px>xl.right+1)return; ctx.save();ctx.strokeStyle=col;ctx.setLineDash([5,4]);ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(px,y.top+8);ctx.lineTo(px,y.bottom);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=col;ctx.font='bold 9px Segoe UI';ctx.textAlign='center';ctx.fillText(lbl,px,y.top+7);ctx.restore(); }
      vl(opts.lsl,'#c0392b','LSL'); vl(opts.usl,'#c0392b','USL'); vl(opts.target,'#1e7e4a','Hedef'); } };
    charts.push(new Chart(document.getElementById(id),{ data:{ labels:g.hist.map(function(b){return b.mid.toFixed(1);}), datasets:[
      { type:'bar', data:g.hist.map(function(b){return b.count;}), backgroundColor:barColor, borderColor:'#8f9bb8', borderWidth:1, categoryPercentage:1, barPercentage:1, order:2 },
      { type:'line', data:curve.map(function(p){return {x:p.x,y:p.y};}), borderColor:'#1f2a44', pointRadius:0, borderWidth:2, tension:0.35, order:1, xAxisID:'xLin' }
    ]}, options:{ responsive:true, maintainAspectRatio:false, layout:{padding:{top:8}}, scales:{ x:{display:false}, xLin:{type:'linear',display:false,min:hlo,max:hhi}, y:{title:{display:true,text:'Frekans'},beginAtZero:true} }, plugins:{legend:{display:false}} }, plugins:[sp] }));
  }
  singleHist('cmpBefore', rb, 'rgba(140,150,170,.5)');
  singleHist('cmpAfter', ra, 'rgba(37,99,235,.4)');
}

async function saveStudy(){
  var vb=parseVals('before'), va=parseVals('after'); if(vb.length<10||va.length<10){ alert('Her iki döneme de ≥10 ölçüm girin.'); return; }
  var name=(document.getElementById('studyName').value||'').trim(); if(!name){ alert('Çalışma adı girin.'); return; }
  var user={}; try{ user=await MSA.currentUser(); }catch(e){}
  var g=function(id){return document.getElementById(id).value;};
  var rec={ study_name:name, study_type:'comparison', description:'Yeterlilik karşılaştırma (önce/sonra)', status:'calculated',
    num_operators:1, num_parts:1, num_trials:1,
    owner_email:(user&&user.email&&user.email!=='no-session')?user.email:null,
    analysis_options:{ comparison:true, before:g('before'), after:g('after'), lsl:g('lsl'), usl:g('usl'), target:g('target'), sg:g('sg') } };
  var id=MSA.q('id');
  try{ if(id){ var u=await MSA.db.from(MSA.T.studies).update(rec).eq('id',id); if(u.error)throw u.error; alert('Güncellendi.'); }
    else { var r=await MSA.db.from(MSA.T.studies).insert(rec).select('id').single(); if(r.error)throw r.error; location.href='cap-compare.html?id='+r.data.id; } }
  catch(e){ alert('Kayıt hatası: '+e.message); }
}
(async function(){
  try{ await MSA.currentUser(); }catch(e){}
  if(!window.capCalculations){ await loadScript('js/cap-calculations.js?v='+Date.now()); }
  var id=MSA.q('id');
  if(id){ var q=await MSA.db.from(MSA.T.studies).select('*').eq('id',id).maybeSingle();
    if(q.data){ var o=q.data.analysis_options||{}; ['before','after','lsl','usl','target','sg'].forEach(function(k){ if(o[k]!=null)document.getElementById(k).value=o[k]; }); document.getElementById('studyName').value=q.data.study_name||''; calc(); return; } }
  loadExample();
})();
</script>
</body>
</html>
