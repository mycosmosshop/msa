<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>window.ERP_GUARD_ALLOW=function(){return ['localhost','127.0.0.1'].includes(location.hostname);};</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://mycosmosshop.github.io/erp-portal/erp-guard.js"></script>
<script src="js/msa-common.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<title>Yeterlilik Veri Girişi</title>
<style>
  :root{--p:#667eea;--p2:#764ba2;--bg:#f5f7fb;--card:#fff;--ink:#232a35;--muted:#6b7280;--line:#e6e9f2}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .wrap{max-width:1000px;margin:0 auto;padding:18px}
  .hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:14px;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .hdr h1{margin:0;font-size:18px}
  .btn{border:0;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff} .btn.ok{background:#1e7e4a;color:#fff} .btn.ghost{background:#eef1f8;color:#41506b} .btn.sm{padding:6px 12px;font-size:12.5px}
  .card{background:var(--card);border-radius:13px;box-shadow:0 2px 10px rgba(30,40,70,.07);padding:14px;margin:14px 0;overflow:auto}
  .hint{font-size:12px;color:var(--muted);margin:8px 2px}
  textarea{width:100%;min-height:80px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:13px}
  .xltbl{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
  .xltbl th,.xltbl td{border:1px solid var(--line);padding:0}
  .xltbl thead th{background:#eef1f8;color:#41506b;font-size:11.5px;font-weight:700;padding:6px 4px;text-align:center;position:sticky;top:0;z-index:2}
  .xltbl tbody th{background:#f5f7fb;color:#6b7280;font-size:11px;font-weight:700;padding:4px 8px;text-align:right;white-space:nowrap;position:sticky;left:0;z-index:1}
  input.m{width:100%;min-width:64px;text-align:center;border:0;outline:0;background:transparent;padding:8px 4px;font-size:13px;font-family:inherit}
  input.m:focus{background:#eaf1ff;box-shadow:inset 0 0 0 2px var(--p)}
  .xltbl td.filled input.m{background:#f2fbf5}
  .acts{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1><i class="bi bi-grid-3x3-gap"></i> Yeterlilik Veri Girişi</h1><div id="sub" style="opacity:.9;font-size:12.5px"></div></div>
    <div class="acts">
      <button class="btn ok" id="save"><i class="bi bi-save"></i> Kaydet</button>
      <a class="btn primary" id="calc" href="#"><i class="bi bi-graph-up"></i> Hesapla ve Sonuçlar</a>
      <a class="btn ghost" href="capability.html"><i class="bi bi-arrow-left"></i> Pano</a>
    </div>
  </div>
  <div id="msg"></div>
  <div class="card">
    <div style="font-weight:600;font-size:13px;margin-bottom:6px"><i class="bi bi-clipboard"></i> Toplu Yapıştır (Excel'den)</div>
    <textarea id="bulk" placeholder="Ölçümleri buraya yapıştırın — her satıra bir değer ya da boşluk/virgülle ayrılmış. Sıra korunur (alt gruplar sırayla oluşur)."></textarea>
    <button class="btn primary sm" id="fill" style="margin-top:8px"><i class="bi bi-arrow-down-square"></i> Tabloya Doldur</button>
  </div>
  <div class="hint" style="margin-top:0"><i class="bi bi-info-circle"></i> Her satır bir <b>alt grup</b>, her sütun o gruptaki bir <b>ölçüm</b>. Excel gibi: <b>Tab</b> = sağa, <b>Enter / ↓</b> = alta (sütun boyu giriş), ok tuşları = gezinme.</div>
  <div class="card"><div id="grid" style="overflow:auto"></div></div>
  <div class="hint" id="prog"></div>
</div>
<script>
(async () => {
  const studyId = MSA.requireQ('id');
  const err = MSA.q('error'); if(err){ document.getElementById('msg').innerHTML='<div style="background:#fdecea;color:#c0392b;padding:10px 14px;border-radius:9px;margin:10px 0">'+err+'</div>'; }
  const { data: study } = await MSA.db.from(MSA.T.studies).select('*').eq('id',studyId).maybeSingle();
  if(!study){ document.body.innerHTML='<p style="padding:40px">Çalışma bulunamadı</p>'; return; }
  document.getElementById('sub').textContent=study.study_name+' · alt grup '+study.num_trials;
  document.getElementById('calc').href='cap-results.html?id='+studyId;

  const { data: meas } = await MSA.db.from(MSA.T.measurements).select('part, measurement').eq('study_id',studyId);
  const { data: parts } = await MSA.db.from(MSA.T.parts).select('part_number').eq('study_id',studyId);
  const existing={}; (meas||[]).forEach(m=>existing[String(m.part)]=m.measurement);
  const partsSorted=(parts||[]).map(p=>p.part_number).sort((a,b)=>a-b);

  const grid=document.getElementById('grid');
  const sg=Math.max(1, parseInt(study.num_trials,10)||5);
  const nRows=Math.ceil(partsSorted.length/sg) || 1;
  let html='<table class="xltbl"><thead><tr><th>Alt Grup</th>';
  for(let c=0;c<sg;c++) html+='<th>Ölçüm '+(c+1)+'</th>';
  html+='</tr></thead><tbody>';
  for(let r=0;r<nRows;r++){
    html+='<tr><th>Grup '+(r+1)+'</th>';
    for(let c=0;c<sg;c++){
      const idx=r*sg+c;
      if(idx<partsSorted.length){ const pn=partsSorted[idx]; const v=(existing[String(pn)]==null?'':Number(existing[String(pn)]));
        html+='<td'+(v!==''?' class="filled"':'')+'><input class="m" data-part="'+pn+'" data-r="'+r+'" data-c="'+c+'" value="'+v+'" inputmode="decimal"></td>';
      } else html+='<td style="background:#f7f8fb"></td>';
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  grid.innerHTML=html;

  function prog(){ const ms=[...grid.querySelectorAll('input.m')]; let f=0;
    ms.forEach(i=>{ const has=i.value.trim()!==''; if(has)f++; if(i.parentElement) i.parentElement.classList.toggle('filled',has); });
    document.getElementById('prog').textContent=f+' / '+ms.length+' ölçüm girildi'; }
  grid.querySelectorAll('input').forEach(i=>i.addEventListener('input',prog)); prog();

  // Excel gibi klavye gezinme
  function focusCell(r,c){ const el=grid.querySelector('input[data-r="'+r+'"][data-c="'+c+'"]'); if(el){ el.focus(); el.select(); return true; } return false; }
  grid.addEventListener('keydown', function(e){
    const t=e.target; if(!t.classList||!t.classList.contains('m')) return;
    const r=+t.dataset.r, c=+t.dataset.c;
    if(e.key==='Enter'||e.key==='ArrowDown'){ e.preventDefault(); if(!focusCell(r+1,c)) focusCell(0,c+1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); focusCell(r-1,c); }
    else if(e.key==='ArrowLeft' && t.selectionStart===0){ e.preventDefault(); if(!focusCell(r,c-1)) focusCell(r-1,sg-1); }
    else if(e.key==='ArrowRight' && t.selectionStart===t.value.length){ e.preventDefault(); if(!focusCell(r,c+1)) focusCell(r+1,0); }
  });

  document.getElementById('fill').addEventListener('click', ()=>{
    const raw=document.getElementById('bulk').value.trim();
    if(!raw) return;
    const vals=raw.split(/[\s,;]+/).map(x=>x.trim()).filter(x=>x!=='');
    const inputs=[...document.querySelectorAll('input.m')];
    vals.forEach((v,idx)=>{ if(inputs[idx]) inputs[idx].value=v; });
    prog();
    if(vals.length>inputs.length){ alert('Uyarı: '+vals.length+' değer yapıştırdınız ama tabloda '+inputs.length+' hücre var. Fazlası atlandı. Çalışma ölçüm sayısını artırmak için yeniden oluşturun.'); }
  });

  async function saveAll(){
    const meas=[]; [...document.querySelectorAll('input.m')].forEach(i=>{
      const v=i.value.trim(); if(v==='') return;
      meas.push({ operator:'1', part:String(i.dataset.part), trial:1, measurement:parseFloat(v) });
    });
    const res=await MSA.saveMeasurements(studyId, meas);
    if(!res.success) throw new Error(res.message||'Kayıt hatası'); return res.count;
  }
  document.getElementById('save').addEventListener('click', async ()=>{
    const b=document.getElementById('save'); b.disabled=true; b.textContent='Kaydediliyor…';
    try{ const c=await saveAll(); b.innerHTML='<i class="bi bi-check2"></i> Kaydedildi ('+c+')'; setTimeout(()=>{b.disabled=false;b.innerHTML='<i class="bi bi-save"></i> Kaydet';},1500); }
    catch(e){ alert('Hata: '+e.message); b.disabled=false; b.innerHTML='<i class="bi bi-save"></i> Kaydet'; }
  });
  document.getElementById('calc').addEventListener('click', async (e)=>{
    e.preventDefault(); const a=e.currentTarget; a.style.pointerEvents='none';
    try{ await saveAll(); location.href='cap-results.html?id='+studyId; }
    catch(err){ alert('Hata: '+err.message); a.style.pointerEvents='auto'; }
  });
})();
</script>
</body>
</html>
