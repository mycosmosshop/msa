<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>window.ERP_GUARD_ALLOW=function(){return ['localhost','127.0.0.1'].includes(location.hostname);};</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://mycosmosshop.github.io/erp-portal/erp-guard.js"></script>
<script src="js/msa-common.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<title>Öznitelik Veri Girişi</title>
<style>
  :root{--p:#667eea;--p2:#764ba2;--bg:#f5f7fb;--card:#fff;--ink:#232a35;--muted:#6b7280;--line:#e6e9f2}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .wrap{max-width:1180px;margin:0 auto;padding:18px}
  .hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:14px;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .hdr h1{margin:0;font-size:18px}
  .btn{border:0;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}
  .btn.ok{background:#1e7e4a;color:#fff} .btn.ghost{background:#eef1f8;color:#41506b}
  .card{background:var(--card);border-radius:13px;box-shadow:0 2px 10px rgba(30,40,70,.07);padding:14px;margin:14px 0;overflow:auto}
  .hint{font-size:12px;color:var(--muted);margin:8px 2px}
  table{border-collapse:collapse;font-size:13px;min-width:100%}
  th,td{border:1px solid var(--line);padding:4px 6px;text-align:center;white-space:nowrap}
  th{background:#f3f5fb;font-weight:600;font-size:11.5px;position:sticky;top:0}
  th.app{background:#e8ecfb;color:#3a4a7a}
  td.part{background:#fafbff;font-weight:600;text-align:left;position:sticky;left:0}
  input.r,input.s{width:42px;text-align:center;border:1px solid var(--line);border-radius:6px;padding:5px 2px;font-size:13px}
  input.s{background:#fff8 e6;background:#fffdf3;border-color:#e8d9a8}
  input.r.v1{background:#eafaf0} input.r.v0{background:#fdecec} input.s.v1{background:#eafaf0} input.s.v0{background:#fdecec}
  .acts{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 0}
  .prog{font-size:12.5px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1><i class="bi bi-grid-3x3-gap"></i> Öznitelik Veri Girişi</h1><div id="sub" style="opacity:.9;font-size:12.5px"></div></div>
    <div class="acts">
      <button class="btn ok" id="save"><i class="bi bi-save"></i> Kaydet</button>
      <a class="btn primary" id="calc" href="#"><i class="bi bi-bar-chart"></i> Hesapla ve Sonuçlar</a>
      <a class="btn ghost" href="index.html"><i class="bi bi-arrow-left"></i> Pano</a>
    </div>
  </div>
  <div id="msg"></div>
  <div class="hint"><b>Standart</b> = parçanın bilinen doğru değeri. <b>Değerlendirme</b> hücreleri: <b>1 = Kabul</b>, <b>0 = Ret</b>. (Standart bilinmiyorsa boş bırakabilirsiniz — o zaman yalnızca uyum/tutarlılık hesaplanır.)</div>
  <div class="card"><table id="grid"></table></div>
  <div class="prog" id="prog"></div>
</div>

<script>
(async () => {
  const studyId = MSA.requireQ('id');
  const user = await MSA.currentUser();
  const err = MSA.q('error'); if(err) { const m=document.getElementById('msg'); m.innerHTML='<div style="background:#fdecea;color:#c0392b;padding:10px 14px;border-radius:9px;margin:10px 0">'+err+'</div>'; }

  const { data: study } = await MSA.db.from(MSA.T.studies).select('*').eq('id',studyId).maybeSingle();
  if(!study){ document.body.innerHTML='<p style="padding:40px">Çalışma bulunamadı</p>'; return; }
  document.getElementById('sub').textContent = study.study_name;
  document.getElementById('calc').href='attr-results.html?id='+studyId;

  const { measurements, operators, parts } = await MSA.getMeasurementsWithNames(studyId);
  const nT = study.num_trials;
  const existing = {}; measurements.forEach(m => existing[m.operator+'-'+m.part+'-'+m.trial] = m.measurement);
  const stdByPart = {}; parts.forEach(p => stdByPart[String(p.part_number)] = p.nominal_value);

  // Grid oluştur
  const grid=document.getElementById('grid');
  let head1='<tr><th rowspan="2" class="part">Parça</th><th rowspan="2">Standart</th>';
  let head2='<tr>';
  operators.forEach(op=>{ head1+='<th class="app" colspan="'+nT+'">'+op.operator_name+'</th>';
    for(let t=1;t<=nT;t++) head2+='<th>T'+t+'</th>'; });
  head1+='</tr>'; head2+='</tr>';
  let rows='';
  parts.forEach(p=>{
    const pn=p.part_number;
    const sv=(stdByPart[String(pn)]==null?'':Number(stdByPart[String(pn)]));
    rows+='<tr><td class="part">'+(p.part_name||('Parça '+pn))+'</td>'+
      '<td><input class="s" data-part="'+pn+'" value="'+sv+'" maxlength="3"></td>';
    operators.forEach(op=>{
      for(let t=1;t<=nT;t++){
        const key=op.operator_number+'-'+pn+'-'+t;
        const v=(existing[key]==null?'':Number(existing[key]));
        rows+='<td><input class="r" data-op="'+op.operator_number+'" data-part="'+pn+'" data-trial="'+t+'" value="'+v+'" maxlength="3"></td>';
      }
    });
    rows+='</tr>';
  });
  grid.innerHTML=head1+head2+rows;

  function paint(inp){ inp.classList.remove('v0','v1'); const v=inp.value.trim(); if(v==='1')inp.classList.add('v1'); else if(v==='0')inp.classList.add('v0'); }
  grid.querySelectorAll('input').forEach(i=>{ paint(i); i.addEventListener('input',()=>{paint(i);updateProg();}); });
  function updateProg(){ const rs=[...grid.querySelectorAll('input.r')]; const filled=rs.filter(i=>i.value.trim()!=='').length;
    document.getElementById('prog').textContent=filled+' / '+rs.length+' değerlendirme girildi'; }
  updateProg();

  async function saveAll(){
    // Standartlar
    const stdUpdates=[...grid.querySelectorAll('input.s')].map(i=>({part:parseInt(i.dataset.part), val:i.value.trim()}));
    for(const s of stdUpdates){
      const nv = s.val===''?null:parseFloat(s.val);
      await MSA.db.from(MSA.T.parts).update({ nominal_value:nv }).eq('study_id',studyId).eq('part_number',s.part);
    }
    // Değerlendirmeler
    const meas=[]; [...grid.querySelectorAll('input.r')].forEach(i=>{
      const v=i.value.trim(); if(v==='') return;
      meas.push({ operator:String(i.dataset.op), part:String(i.dataset.part), trial:parseInt(i.dataset.trial), measurement:parseFloat(v) });
    });
    const res = await MSA.saveMeasurements(studyId, meas);
    if(!res.success) throw new Error(res.message || 'Kayıt hatası');
    return res.count;
  }

  document.getElementById('save').addEventListener('click', async ()=>{
    const b=document.getElementById('save'); b.disabled=true; b.textContent='Kaydediliyor…';
    try{ const c=await saveAll(); b.innerHTML='<i class="bi bi-check2"></i> Kaydedildi ('+c+')'; setTimeout(()=>{b.disabled=false;b.innerHTML='<i class="bi bi-save"></i> Kaydet';},1500); }
    catch(e){ alert('Hata: '+e.message); b.disabled=false; b.innerHTML='<i class="bi bi-save"></i> Kaydet'; }
  });
  document.getElementById('calc').addEventListener('click', async (e)=>{
    e.preventDefault(); const a=e.currentTarget; a.style.pointerEvents='none';
    try{ await saveAll(); location.href='attr-results.html?id='+studyId; }
    catch(err){ alert('Hata: '+err.message); a.style.pointerEvents='auto'; }
  });
})();
</script>
</body>
</html>
