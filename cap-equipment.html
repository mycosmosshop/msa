<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<script>window.ERP_GUARD_ALLOW=function(){return ['localhost','127.0.0.1'].includes(location.hostname);};</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://mycosmosshop.github.io/erp-portal/erp-guard.js"></script>
<script src="js/msa-common.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<title>Yeterlilik Ekipman Listesi</title>
<style>
  :root{--p:#667eea;--p2:#764ba2;--bg:#f5f7fb;--card:#fff;--ink:#232a35;--muted:#6b7280;--line:#e6e9f2}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  .wrap{max-width:1100px;margin:0 auto;padding:20px}
  .hdr{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:16px;padding:20px 26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .hdr h1{margin:0;font-size:21px;display:flex;align-items:center;gap:10px} .hdr p{margin:4px 0 0;opacity:.9;font-size:13px}
  .btn{border:0;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:#fff;color:var(--p)} .btn.ghost{background:rgba(255,255,255,.2);color:#fff}
  .acts{display:flex;gap:10px;flex-wrap:wrap}
  .card{background:var(--card);border-radius:14px;box-shadow:0 2px 12px rgba(30,40,70,.07);padding:16px 18px;border:1px solid var(--line);margin-top:18px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left}
  th{background:#f3f5fb;color:#39415a;font-size:12px;font-weight:700}
  tr:hover td{background:#fafbff}
  .badge{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
  .b-on{background:#e6f7ec;color:#1e7e4a} .b-off{background:#eef1f8;color:#6b7280}
  .chip{background:#eef1ff;color:#4a5aa8;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .sbtn{border:0;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .sbtn.edit{background:#f0a020;color:#fff} .sbtn.del{background:#f4e6e6;color:#c0392b}
  .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
  .fld{display:flex;flex-direction:column;gap:3px;font-size:12px;font-weight:600;color:#4a5568}
  .fld input,.fld select,.fld textarea{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;font-weight:400;color:var(--ink)}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:44px 20px;text-align:center;color:var(--muted);margin-top:18px}
  .empty i{font-size:40px;color:#c9d2e3;display:block;margin-bottom:10px}
  .sqlbox{background:#0f1729;color:#a7f3d0;border-radius:10px;padding:14px;font-family:ui-monospace,Consolas,monospace;font-size:11.5px;white-space:pre-wrap;overflow:auto;max-height:320px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1><i class="bi bi-hdd-stack"></i> Ekipman Listesi</h1><p>Yeterlilik izlenen makine / kalıp / hat / proses</p></div>
    <div class="acts">
      <a class="btn ghost" href="cap-plan.html"><i class="bi bi-calendar-check"></i> Plan</a>
      <a class="btn ghost" href="capability.html"><i class="bi bi-arrow-left"></i> Pano</a>
      <button class="btn primary" id="addBtn"><i class="bi bi-plus-circle"></i> Ekipman Ekle</button>
    </div>
  </div>

  <div class="card" id="formCard" style="display:none">
    <h3 style="margin:0 0 12px;font-size:16px" id="formTitle">Yeni Ekipman</h3>
    <input type="hidden" id="f_id">
    <div class="fgrid">
      <label class="fld">Ad *<input id="f_name" placeholder="ör. Enjeksiyon Makinesi 3"></label>
      <label class="fld">Kod / No<input id="f_code" placeholder="ör. MK-003"></label>
      <label class="fld">Tür<select id="f_type"><option value="">—</option><option>Makine</option><option>Kalıp</option><option>Hat</option><option>Proses</option><option>Cihaz</option></select></label>
      <label class="fld">Lokasyon<input id="f_location" placeholder="ör. Salon A"></label>
      <label class="fld">Sorumlu (e-posta)<input id="f_resp" placeholder="ad@firma.com"></label>
      <label class="fld">Durum<select id="f_active"><option value="true">Aktif</option><option value="false">Pasif</option></select></label>
    </div>
    <label class="fld" style="margin-top:10px">Açıklama<textarea id="f_desc" rows="2" placeholder="Notlar…"></textarea></label>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn primary" id="saveBtn" style="background:var(--p);color:#fff"><i class="bi bi-save"></i> Kaydet</button>
      <button class="btn" id="cancelBtn" style="background:#eef1f8;color:#41506b">Vazgeç</button>
    </div>
  </div>

  <div id="body"><div style="padding:40px;color:var(--p)">Yükleniyor…</div></div>
</div>

<script>
const T='cap_equipment';
const SQL_HINT=`-- Supabase SQL editöründe bir kez çalıştırın:
create table if not exists public.cap_equipment (
  id bigint generated by default as identity primary key,
  name text not null, code text, type text, location text,
  responsible_email text, description text, is_active boolean default true,
  created_at timestamptz default now(), updated_at timestamptz default now());
alter table public.cap_equipment enable row level security;
drop policy if exists cap_equipment_all on public.cap_equipment;
create policy cap_equipment_all on public.cap_equipment for all to public using (true) with check (true);`;
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
const body=document.getElementById('body');
const formCard=document.getElementById('formCard');

function showForm(row){
  row=row||{};
  document.getElementById('formTitle').textContent = row.id?'Ekipman Düzenle':'Yeni Ekipman';
  document.getElementById('f_id').value=row.id||'';
  document.getElementById('f_name').value=row.name||'';
  document.getElementById('f_code').value=row.code||'';
  document.getElementById('f_type').value=row.type||'';
  document.getElementById('f_location').value=row.location||'';
  document.getElementById('f_resp').value=row.responsible_email||'';
  document.getElementById('f_active').value=(row.is_active===false)?'false':'true';
  document.getElementById('f_desc').value=row.description||'';
  formCard.style.display=''; formCard.scrollIntoView({behavior:'smooth',block:'nearest'});
}
document.getElementById('addBtn').addEventListener('click',()=>showForm());
document.getElementById('cancelBtn').addEventListener('click',()=>{formCard.style.display='none';});

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const name=document.getElementById('f_name').value.trim();
  if(!name){ alert('Ad zorunlu.'); return; }
  const rec={ name, code:document.getElementById('f_code').value.trim()||null, type:document.getElementById('f_type').value||null,
    location:document.getElementById('f_location').value.trim()||null, responsible_email:document.getElementById('f_resp').value.trim()||null,
    is_active:document.getElementById('f_active').value==='true', description:document.getElementById('f_desc').value.trim()||null,
    updated_at:new Date().toISOString() };
  const id=document.getElementById('f_id').value;
  const b=document.getElementById('saveBtn'); b.disabled=true; b.innerHTML='<i class="bi bi-hourglass"></i> Kaydediliyor…';
  try{
    if(id){ const r=await MSA.db.from(T).update(rec).eq('id',id); if(r.error)throw r.error; }
    else { const r=await MSA.db.from(T).insert(rec); if(r.error)throw r.error; }
    formCard.style.display='none'; await load();
  }catch(e){ alert('Kayıt hatası: '+e.message); }
  finally{ b.disabled=false; b.innerHTML='<i class="bi bi-save"></i> Kaydet'; }
});

async function load(){
  try{
    const { data, error } = await MSA.db.from(T).select('*').order('created_at',{ascending:false});
    if(error) throw error;
    if(!data || !data.length){ body.innerHTML='<div class="empty"><i class="bi bi-hdd-stack"></i><div style="font-size:16px;font-weight:600;color:#4a5568">Henüz ekipman yok</div><div style="margin-top:6px">Yukarıdan <b>Ekipman Ekle</b> ile başlayın.</div></div>'; return; }
    let rows=data.map(e=>`<tr>
      <td><strong>${esc(e.name)}</strong></td>
      <td>${e.code?esc(e.code):'—'}</td>
      <td>${e.type?('<span class="chip">'+esc(e.type)+'</span>'):'—'}</td>
      <td>${e.location?esc(e.location):'—'}</td>
      <td>${e.responsible_email?esc(e.responsible_email):'—'}</td>
      <td>${e.is_active===false?'<span class="badge b-off">Pasif</span>':'<span class="badge b-on">Aktif</span>'}</td>
      <td style="white-space:nowrap"><button class="sbtn edit" data-id="${e.id}"><i class="bi bi-pencil"></i></button>
        <button class="sbtn del" data-id="${e.id}" data-name="${esc(e.name)}"><i class="bi bi-trash"></i></button></td></tr>`).join('');
    body.innerHTML='<div class="card"><table><thead><tr><th>Ad</th><th>Kod</th><th>Tür</th><th>Lokasyon</th><th>Sorumlu</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    body.querySelectorAll('.sbtn.edit').forEach(btn=>btn.addEventListener('click',()=>{ const e=data.find(x=>String(x.id)===btn.dataset.id); if(e) showForm(e); }));
    body.querySelectorAll('.sbtn.del').forEach(btn=>btn.addEventListener('click', async ()=>{
      if(!confirm('"'+btn.dataset.name+'" silinsin mi?')) return;
      try{ const r=await MSA.db.from(T).delete().eq('id',btn.dataset.id); if(r.error)throw r.error; await load(); }
      catch(e){ alert('Silme hatası: '+e.message); }
    }));
  }catch(e){
    const missing=/(relation|table).*(exist|bulun)|does not exist|not find|schema cache/i.test(e.message||'');
    if(missing){ body.innerHTML='<div class="card"><h3 style="margin:0 0 6px;color:#b7791f"><i class="bi bi-exclamation-triangle"></i> Tablo bulunamadı</h3><p style="color:var(--muted);font-size:13px;margin:0">Bu özellik için Supabase\'de aşağıdaki SQL\'i bir kez çalıştırın (Kalite projesi). Sonra sayfayı yenileyin.</p><div class="sqlbox">'+esc(SQL_HINT)+'</div><button class="btn primary" style="background:var(--p);color:#fff;margin-top:10px" onclick="navigator.clipboard&&navigator.clipboard.writeText(SQL_HINT);this.innerHTML=\'<i class=\\\'bi bi-check2\\\'></i> Kopyalandı\'"><i class="bi bi-clipboard"></i> SQL\'i Kopyala</button></div>'; }
    else body.innerHTML='<div class="empty" style="color:#c0392b"><i class="bi bi-exclamation-triangle"></i>Yüklenemedi: '+esc(e.message)+'</div>';
  }
}
(async()=>{ try{ await MSA.currentUser(); }catch(e){} load(); })();
</script>
</body>
</html>
